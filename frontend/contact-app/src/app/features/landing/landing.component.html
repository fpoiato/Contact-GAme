<div class="mx-auto flex min-h-full max-w-md flex-col gap-6 p-6">
  <div class="flex items-center justify-between">
    <h1 class="text-4xl font-black tracking-tight">{{ 'APP_TITLE' | translate }}</h1>
    <app-language-toggle />
  </div>

  <p class="text-lg text-white/80">Party word game — mobile first, real-time fun.</p>

  <div class="card flex flex-col gap-4">
    <label class="flex flex-col gap-2">
      <span class="font-semibold">{{ 'NICKNAME' | translate }}</span>
      <input
        class="rounded-xl border-0 bg-white/90 px-4 py-3 text-purple-900"
        [(ngModel)]="nickname"
        [placeholder]="'NICKNAME_PLACEHOLDER' | translate"
        maxlength="20"
      />
    </label>

    @if (joinMode) {
      <label class="flex flex-col gap-2">
        <span class="font-semibold">{{ 'ROOM_CODE' | translate }}</span>
        <input
          class="rounded-xl border-0 bg-white/90 px-4 py-3 uppercase tracking-widest text-purple-900"
          [(ngModel)]="roomCode"
          [placeholder]="'ROOM_CODE_PLACEHOLDER' | translate"
          maxlength="5"
        />
      </label>
    }

    @if (error) {
      <p class="rounded-xl bg-coral/30 px-4 py-2 text-sm font-semibold">{{ error }}</p>
    }

    @if (!joinMode) {
      <button type="button" class="btn-primary w-full" [disabled]="loading" (click)="createGame()">
        {{ 'CREATE_GAME' | translate }}
      </button>
      <button type="button" class="btn-secondary w-full" [disabled]="loading" (click)="showJoin()">
        {{ 'JOIN_GAME' | translate }}
      </button>
    } @else {
      <button type="button" class="btn-primary w-full" [disabled]="loading" (click)="joinGame()">
        {{ 'JOIN' | translate }}
      </button>
      <button type="button" class="btn-secondary w-full" [disabled]="loading" (click)="cancelJoin()">
        {{ 'BACK' | translate }}
      </button>
    }
  </div>
</div>
